<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Carregando... · Veltro OS</title>
  <script>
    // ═══════════════════════════════════════════════════════════════
    // 404.html → Roteador SPA pro Veltro OS
    //
    // GitHub Pages serve este arquivo quando a URL não existe.
    // Estrutura desejada:
    //   /              → site institucional (index.html, GitHub serve direto)
    //   /app           → tela de login do sistema (app.html)
    //   /laluna        → dashboard La Luna (app.html?empresa=laluna)
    //   /fanclub       → dashboard FanClub (app.html?empresa=fanclub)
    //   /qualquer      → dashboard <qualquer> (app.html?empresa=qualquer)
    // ═══════════════════════════════════════════════════════════════
    (function() {
      var l = window.location;
      var path = (l.pathname || '').replace(/^\/+/, '').replace(/\/+$/, '');
      var primeiro = (path.split('/')[0] || '').toLowerCase();

      // Sem path → manda pra home (defensivo, raramente acontece)
      if(!primeiro) {
        l.replace(l.protocol + '//' + l.hostname +
                  (l.port ? ':' + l.port : '') + '/');
        return;
      }

      // Acesso ao sistema (login admin)
      if(primeiro === 'app' || primeiro === 'app.html') {
        l.replace(l.protocol + '//' + l.hostname +
                  (l.port ? ':' + l.port : '') + '/app.html' + l.search + l.hash);
        return;
      }

      // Path com extensão (ex: /algo.html, /imagem.png) — não é empresa, manda pra home
      if(/\./.test(primeiro)) {
        l.replace(l.protocol + '//' + l.hostname +
                  (l.port ? ':' + l.port : '') + '/');
        return;
      }

      // Caso padrão: trata como ID de empresa (ex: /laluna, /fanclub)
      // Validação: ID precisa ter 2+ chars e ser alfanumérico simples
      if(primeiro.length >= 2 && /^[a-z0-9_-]+$/i.test(primeiro)) {
        l.replace(l.protocol + '//' + l.hostname +
                  (l.port ? ':' + l.port : '') +
                  '/app.html?empresa=' + encodeURIComponent(primeiro) + l.hash);
        return;
      }

      // Qualquer outra coisa estranha → home
      l.replace(l.protocol + '//' + l.hostname +
                (l.port ? ':' + l.port : '') + '/');
    })();
  </script>
  <style>
    body{margin:0;background:#0A0C10;color:#888;font-family:-apple-system,sans-serif;
         display:flex;align-items:center;justify-content:center;height:100vh;font-size:14px}
  </style>
</head>
<body>
  <div>Carregando...</div>
</body>
</html>
